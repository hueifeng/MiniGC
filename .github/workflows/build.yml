name: build

# Verifies that MiniGC's native GC DLL compiles on each platform that
# the project supports. Runtime integration (DOTNET_GCPath) is verified
# out-of-band on developer machines because the GitHub-hosted runners
# pin specific .NET SDK versions and we want to keep the matrix small
# and fast. This workflow catches toolchain / header regressions in the
# cross-platform code path early.

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  build-native:
    name: native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          - os: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang

      - name: Install macOS build tools
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install cmake ninja

      - name: Configure (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          cmake -S MiniGC -B MiniGC/build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build (Linux / macOS)
        if: runner.os != 'Windows'
        run: cmake --build MiniGC/build --parallel

      - name: Verify symbol exports (Linux)
        if: runner.os == 'Linux'
        run: |
          set -e
          DYLIB="MiniGC/build/libMiniGC.so"
          if [ ! -f "$DYLIB" ]; then
            echo "ERROR: $DYLIB was not produced"
            ls -la MiniGC/build/
            exit 1
          fi
          # The two entry points CoreCLR dlopen()s. Their absence means the
          # hidden-visibility settings broke the GC-EE contract.
          objdump -T "$DYLIB" | grep -E ' GC_Initialize$| GC_VersionInfo$'

      - name: Verify symbol exports (macOS)
        if: runner.os == 'macOS'
        run: |
          set -e
          DYLIB="MiniGC/build/libMiniGC.dylib"
          if [ ! -f "$DYLIB" ]; then
            echo "ERROR: $DYLIB was not produced"
            ls -la MiniGC/build/
            exit 1
          fi
          nm -gU "$DYLIB" | grep -E '_GC_Initialize$|_GC_VersionInfo$'

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        # windows-latest ships VS 2022 and msbuild on PATH, but cl.exe /
        # link.exe / dumpbin are gated behind vcvars64.bat. We resolve the
        # latest VS install through vswhere and source vcvars64.bat to
        # bring the toolchain into the same cmd.exe session that runs
        # cmake / dumpbin.
        #
        # We use the NMake Makefiles generator here rather than the
        # "Visual Studio 17 2022" generator because the VS generator
        # relies on registry-discovered instances and, on this runner
        # image, cmake cannot find one even after vcvars is sourced.
        # NMake is shipped with VS itself, so once vcvars is up the
        # nmake binary and cl.exe are both on PATH.
        shell: cmd
        run: |
          for /f "usebackq delims=" %%i in (`"C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set VS_INSTALL=%%i
          call "%VS_INSTALL%\VC\Auxiliary\Build\vcvars64.bat" >nul
          cmake -S MiniGC -B MiniGC/build -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          for /f "usebackq delims=" %%i in (`"C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set VS_INSTALL=%%i
          call "%VS_INSTALL%\VC\Auxiliary\Build\vcvars64.bat" >nul
          cmake --build MiniGC/build --parallel

      - name: Verify symbol exports (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          for /f "usebackq delims=" %%i in (`"C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set VS_INSTALL=%%i
          call "%VS_INSTALL%\VC\Auxiliary\Build\vcvars64.bat" >nul
          set DYLIB=MiniGC\build\MiniGC.dll
          if not exist "%DYLIB%" (
            echo ERROR: %DYLIB% was not produced
            dir MiniGC\build\
            exit /b 1
          )
          rem The two entry points CoreCLR dlopen()s. Their absence means the
          rem hidden-visibility settings broke the GC-EE contract. The trailing
          rem $ in findstr anchors the match so GC_InitializeFoo doesn't match.
          dumpbin /EXPORTS "%DYLIB%" | findstr /R " GC_Initialize$ GC_VersionInfo$"
          if errorlevel 1 (
            echo GC_Initialize / GC_VersionInfo not found in %DYLIB% exports
            exit /b 1
          )

      - name: Build GcDemo (BCL only, no NuGet)
        run: dotnet build GcDemo/GcDemo.csproj -c Release
